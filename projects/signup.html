<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="CSS/style.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <div class="login">
            <h2> Create Account</h2>
        </div>
        <form id="signup">
            <div class="input">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required >
                
            </div>
            <div class="input">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required >
                <span id="eemail" class="error"></span>
            </div>
            <div class="input">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <span id="epass" class="error"></span>
            </div>
            <div class="input">
                <label for="cpassword">Confirm Password</label>
                <input type="password" id="cpassword" placeholder="Confirm your Password" required >
                <span id="ecpass" class="error"></span>
            </div>
            <button type="submit" class="sign">Create New Account </button>
            <p class="text">
          Already have an account? <a href="login.html">Login</a>
        </p>
        </form>
    </div>
    <script src="javascript/main.js"></script>
</body>
</html>
